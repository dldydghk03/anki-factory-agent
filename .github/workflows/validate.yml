name: Validate examples

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  review-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate review events
        run: npm run validate

